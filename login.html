<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Kit IA Estratégica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <nav class="bg-white border-b py-4">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">AI</div>
                <span class="title-font text-2xl font-semibold tracking-tighter">Kit IA Estratégica</span>
            </a>
            <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-blue-600"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 max-w-md w-full">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <h1 class="title-font text-3xl font-bold">Iniciar Sesión</h1>
                <p class="text-gray-500 mt-2 text-sm">Ingresa con tu correo y contraseña.</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="email" required 
                           class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="ejemplo@correo.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="password" required 
                           class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="••••••••">
                </div>
                
                <div id="error-msg" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-sm flex items-center gap-2">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text">Credenciales incorrectas.</span>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl font-medium transition mt-4">
                    Ingresar
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                ¿No tienes cuenta? <a href="register.html" class="text-blue-600 hover:underline font-medium">Regístrate gratis</a>
            </div>
            
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-500">Usuarios de prueba:<br><b>admin@kitia.com</b> (123) - Admin<br><b>premium@test.com</b> (123) - Premium<br><b>free@test.com</b> (123) - Gratis</p>
            </div>
        </div>
    </main>

    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (user) {
                if (user.type === 'admin') window.location.href = 'admin.html';
                else if (user.type === 'onetime') window.location.href = 'downloads.html';
                else window.location.href = 'dashboard.html';
            }
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            
            const user = verifyUser(email, password);
            
            if (user) {
                if (user.status === 'inactive') {
                    errorText.textContent = 'Cuenta suspendida por falta de pago.';
                    errorMsg.classList.remove('hidden');
                } else {
                    errorMsg.classList.add('hidden');
                    loginUser(user);
                    // Redirigir según el tipo
                    if (user.type === 'admin') window.location.href = 'admin.html';
                    else if (user.type === 'onetime') window.location.href = 'downloads.html';
                    else window.location.href = 'dashboard.html';
                }
            } else {
                errorText.textContent = 'Correo o contraseña incorrectos.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
