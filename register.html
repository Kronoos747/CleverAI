<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Kit IA Estratégica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <nav class="bg-white border-b py-4">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">AI</div>
                <span class="title-font text-2xl font-semibold tracking-tighter">Kit IA Estratégica</span>
            </a>
            <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-blue-600"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 max-w-md w-full">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 class="title-font text-3xl font-bold">Crea tu Cuenta</h1>
                <p class="text-gray-500 mt-2 text-sm">Únete gratis y mejora tus habilidades con IA hoy mismo.</p>
            </div>

            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                    <input type="text" id="name" required 
                           class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="Juan Pérez">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="email" required 
                           class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="ejemplo@correo.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="password" required minlength="4"
                           class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" required minlength="4"
                           class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="••••••••">
                </div>
                
                <div id="error-msg" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-sm flex items-center gap-2">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text">El correo ya está registrado.</span>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl font-medium transition mt-4">
                    Registrarme Gratis
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                ¿Ya tienes cuenta? <a href="login.html" class="text-blue-600 hover:underline font-medium">Inicia sesión</a>
            </div>
        </div>
    </main>

    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            
            if (password !== confirmPassword) {
                errorText.textContent = 'Las contraseñas no coinciden.';
                errorMsg.classList.remove('hidden');
                return;
            }

            const newUser = registerUser(name, email, password);
            
            if (newUser) {
                errorMsg.classList.add('hidden');
                loginUser(newUser);
                window.location.href = 'dashboard.html';
            } else {
                errorText.textContent = 'Este correo ya está registrado.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
